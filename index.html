<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DimenWiki - Custom Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { 
            --bg-dark: #f8fafc; 
            --bg-sidebar: #ffffff; 
            --bg-card: #f1f5f9; 
            --text-main: #0f172a; 
            --text-muted: #475569; 
            --accent: #7c3aed; 
            --accent-hover: #6d28d9; 
            --border: #e2e8f0; 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Configuration */
        #sidebar { width: 290px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; box-shadow: 2px 0 5px rgba(0,0,0,0.02); }
        h1 { font-size: 1.25rem; margin-bottom: 15px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* Custom Internal Login Module */
        .custom-login-box { padding: 12px; background: var(--bg-card); border-radius: 8px; border: 1px solid var(--border); margin-bottom: 15px; font-size: 0.85rem; }
        .login-input { width: 100%; padding: 6px 10px; border: 1px solid var(--border); border-radius: 4px; margin-top: 5px; margin-bottom: 8px; font-size: 0.8rem; }
        
        .creator-ctrl { display: none; }
        
        .btn { background: var(--accent); color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: 600; width: 100%; margin-bottom: 15px; transition: background 0.2s; }
        .btn:hover { background: var(--accent-hover); }
        .btn-sm { padding: 5px 10px; font-size: 0.8rem; border-radius: 4px; margin: 0; }
        
        #page-list { list-style: none; overflow-y: auto; flex-grow: 1; }
        #page-list li { padding: 10px; border-radius: 6px; cursor: pointer; margin-bottom: 5px; color: var(--text-muted); font-weight: 500; transition: all 0.2s; }
        #page-list li:hover { background: var(--bg-card); color: var(--text-main); }
        #page-list li.active { background: #e0e7ff; color: var(--accent); }
        
        /* Work Panels */
        #main-content { flex-grow: 1; display: flex; flex-direction: column; height: 100%; background: var(--bg-dark); }
        #top-bar { padding: 20px 40px; background: var(--bg-sidebar); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        #current-title { font-size: 2rem; font-weight: 700; color: var(--text-main); }
        #content-area { padding: 40px; flex-grow: 1; overflow-y: auto; }
        .panel { display: none; height: 100%; }
        .panel.active { display: block; }
        
        /* Rendered Markdown Area */
        #view-panel { font-size: 1.1rem; line-height: 1.7; color: #334155; }
        #view-panel h1, #view-panel h2 { margin: 25px 0 10px; color: var(--text-main); border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        #view-panel ul { margin-left: 25px; margin-bottom: 15px; }
        #view-panel blockquote { background: var(--bg-card); border-left: 4px solid var(--accent); padding: 15px; margin: 20px 0; font-style: italic; color: var(--text-muted); border-radius: 0 6px 6px 0; }
        #view-panel code { background: #fee2e2; padding: 2px 6px; border-radius: 4px; font-family: monospace; color: #dc2626; }
        
        /* Editor Mode */
        #edit-panel { display: flex; flex-direction: column; gap: 15px; }
        .input-field { background: var(--bg-sidebar); border: 1px solid var(--border); color: var(--text-main); padding: 12px; border-radius: 6px; font-size: 1rem; width: 100%; box-shadow: inset 0 1px 2px rgba(0,0,0,0.05); }
        textarea.input-field { resize: none; flex-grow: 1; min-height: 400px; font-family: monospace; }
        .button-group { display: flex; gap: 10px; justify-content: flex-end; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h1>🌌 DimenWiki</h1>
        
        <div class="custom-login-box" id="login-container">
            <div id="logged-out-view">
                <span style="font-weight: 600; color: var(--text-muted);">🔒 Creator Dashboard</span>
                <input type="password" id="token-input" class="login-input" placeholder="Paste Access Token Key...">
                <button class="btn btn-sm" style="width: 100%;" onclick="attemptLogin()">Verify Key</button>
            </div>
            <div id="logged-in-view" style="display: none; text-align: center;">
                <span style="font-weight: 600; color: #16a34a; display: block; margin-bottom: 8px;">🟢 Creator Workspace Active</span>
                <button class="btn btn-sm" style="background: #ef4444;" onclick="logoutCreator()">Lock Workspace</button>
            </div>
        </div>

        <button class="btn creator-ctrl" id="new-pg-btn" onclick="startNewPage()">+ Create New Page</button>
        <ul id="page-list"></ul>
    </div>

    <div id="main-content">
        <div id="top-bar">
            <h2 id="current-title">Loading...</h2>
            <button id="edit-btn" class="btn creator-ctrl" style="margin:0; width:auto;" onclick="switchToEdit()">Edit Page</button>
        </div>
        <div id="content-area">
            <div id="view-panel" class="panel active">Synchronizing database metrics...</div>
            
            <div id="edit-panel" class="panel">
                <input type="text" id="edit-title" class="input-field" placeholder="Page Title">
                <textarea id="edit-text" class="input-field" placeholder="Write page structure in Markdown format..."></textarea>
                <div class="button-group">
                    <button class="btn" style="background:transparent; border:1px solid var(--border); color: var(--text-muted);" onclick="cancelEdit()">Cancel</button>
                    <button class="btn" style="width:auto;" onclick="savePageDirectly()">Save Page Changes</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        const CONFIG = {
            OWNER: "dimenwiki", 
            REPO: "dimenwiki.github.io"
        };

        let wikiData = {};
        let currentPage = "Home";
        let isCreatingNew = false;
        let activeToken = null;

        // Validates internal authentication locks locally
        function checkSession() {
            const savedToken = localStorage.getItem("dimenwiki_secure_token");
            if (savedToken) {
                activeToken = savedToken;
                document.getElementById('logged-out-view').style.display = 'none';
                document.getElementById('logged-in-view').style.display = 'block';
                document.querySelectorAll('.creator-ctrl').forEach(el => el.style.display = 'block');
                return true;
            }
            return false;
        }

        window.attemptLogin = function() {
            const tokenValue = document.getElementById('token-input').value.trim();
            if (!tokenValue) return alert("Please input your authorization key!");
            
            // Instantly check if token works by running an API call test
            fetch(`https://api.github.com/repos/${CONFIG.OWNER}/${CONFIG.REPO}`, {
                headers: { 'Authorization': `token ${tokenValue}` }
            }).then(res => {
                if(res.ok) {
                    localStorage.setItem("dimenwiki_secure_token", tokenValue);
                    window.location.reload();
                } else {
                    alert("Invalid Token. Confirm the access scopes of your key settings.");
                }
            }).catch(() => alert("Connection error. Try again."));
        }

        window.logoutCreator = function() {
            localStorage.removeItem("dimenwiki_secure_token");
            window.location.reload();
        }

        async function fetchWikiData() {
            const hasAccess = checkSession();
            try {
                // Read content directory data openly
                const res = await fetch(`https://api.github.com/repos/${CONFIG.OWNER}/${CONFIG.REPO}/contents/wiki_data`);
                if (res.status === 200) {
                    const files = await res.json();
                    wikiData = {};
                    for (const file of files) {
                        if (file.name.endsWith('.md')) {
                            const rawRes = await fetch(`https://raw.githubusercontent.com/${CONFIG.OWNER}/${CONFIG.REPO}/main/${file.path}`);
                            const content = await rawRes.text();
                            wikiData[file.name.replace('.md', '')] = content;
                        }
                    }
                }
                if (Object.keys(wikiData).length === 0) {
                    wikiData["Home"] = "# Welcome to DimenWiki\n\nLogin using your dashboard token module key to append database folders.";
                }
                renderSidebar();
                loadPage(currentPage in wikiData ? currentPage : Object.keys(wikiData)[0]);
            } catch (err) {
                document.getElementById('view-panel').textContent = "Failed to sync archive elements.";
            }
        }

        function renderSidebar() {
            const list = document.getElementById('page-list');
            list.innerHTML = '';
            Object.keys(wikiData).sort().forEach(title => {
                const li = document.createElement('li');
                li.textContent = title;
                if(title === currentPage && !isCreatingNew) li.classList.add('active');
                li.onclick = () => loadPage(title);
                list.appendChild(li);
            });
        }

        function loadPage(title) {
            currentPage = title;
            isCreatingNew = false;
            document.getElementById('current-title').textContent = title;
            document.getElementById('view-panel').innerHTML = marked.parse(wikiData[title] || "");
            document.getElementById('edit-panel').classList.remove('active');
            document.getElementById('view-panel').classList.add('active');
            if (activeToken) document.getElementById('edit-btn').style.display = 'block';
            renderSidebar();
        }

        function switchToEdit() {
            document.getElementById('edit-title').value = isCreatingNew ? "" : currentPage;
            document.getElementById('edit-title').disabled = !isCreatingNew;
            document.getElementById('edit-text').value = isCreatingNew ? "" : wikiData[currentPage];
            document.getElementById('view-panel').classList.remove('active');
            document.getElementById('edit-panel').classList.add('active');
            document.getElementById('edit-btn').style.display = 'none';
        }

        window.startNewPage = function() {
            isCreatingNew = true;
            document.getElementById('current-title').textContent = "New Page Entry";
            switchToEdit();
        }

        window.cancelEdit = function() { loadPage(currentPage); }
        window.switchToEdit = switchToEdit;

        // Direct database push mechanism via active validated session keys
        window.savePageDirectly = async function() {
            const title = document.getElementById('edit-title').value.trim().replace(/[^a-zA-Z0-9 ]/g, "");
            const content = document.getElementById('edit-text').value.trim();
            if(!title || !content) return alert("All custom data fields must have content inputs!");

            document.getElementById('view-panel').textContent = "Pushing live file updates directly into database clusters...";
            document.getElementById('edit-panel').classList.remove('active');
            document.getElementById('view-panel').classList.add('active');

            const path = `wiki_data/${title}.md`;
            let sha = undefined;

            try {
                const checkRes = await fetch(`https://api.github.com/repos/${CONFIG.OWNER}/${CONFIG.REPO}/contents/${path}`);
                if (checkRes.ok) {
                    const checkData = await checkRes.json();
                    sha = checkData.sha;
                }
            } catch (e) {}

            const res = await fetch(`https://api.github.com/repos/${CONFIG.OWNER}/${CONFIG.REPO}/contents/${path}`, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${activeToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: `DimenWiki Update via Custom Dashboard: ${title}`,
                    content: btoa(unescape(encodeURIComponent(content))),
                    sha: sha
                })
            });

            if (res.ok) {
                wikiData[title] = content;
                currentPage = title;
                fetchWikiData();
            } else {
                alert("Database update failure. Validate the scopes of your dashboard key.");
                loadPage(currentPage);
            }
        }

        fetchWikiData();
    </script>
</body>
</html>
